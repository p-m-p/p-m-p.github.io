{% assign post = include.post %}
<article class="post {{include.post_class}}">
  <header>
    <h2 class="title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <time class="post-date" date-time="{{post.date}}">{{ post.date | date_to_string }}</time>
  </header>
  <section class="post-content">
    {% if include.post_class == 'single' %}
      {{content}}
    {% else %}
      {{post.excerpt}}
    {% endif %}
  </section>
</article>
